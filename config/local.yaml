env: 'local' # dev, prod
access_token_ttl: 5m
refresh_token_ttl: 168h
grpc:
  port: 1337
  timeout: 1488h
  rps: 3
  burst: 6
postgres:
  port: 5432
  host: 'postgres'
  reaper_delay: 3h
redis:
  port: 6379
  host: 'redis'
  timeout: 15s
  retries: 3
http:
  rps: 3
  burst: 6
  visitor_cleaner_delay: 3h
